<!DOCTYPE html>
<html lang="pt-MZ">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#07101F"/>
  <title>MzDocs Pro — Sem Ligação</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📄%3C/text%3E%3C/svg%3E" type="image/svg+xml">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07101F;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center}
    .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:3rem 2rem;max-width:420px;width:100%}
    .icon{font-size:4rem;margin-bottom:1.5rem;display:block}
    h1{font-size:1.75rem;font-weight:800;margin-bottom:.75rem}
    p{color:#94a3b8;line-height:1.6;margin-bottom:2rem}
    button{background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;border:none;border-radius:12px;padding:.875rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;width:100%;transition:opacity .2s}
    button:hover{opacity:.85}
    .hint{margin-top:1rem;font-size:.8rem;color:#64748b}
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>Sem Ligação à Internet</h1>
    <p>Não foi possível carregar a página.<br/>Verifique a sua ligação de dados e tente novamente.</p>
    <button onclick="location.reload()">🔄 Tentar Novamente</button>
    <p class="hint">O MzDocs Pro funciona offline para páginas já visitadas.</p>
  </div>
</body>
</html>
