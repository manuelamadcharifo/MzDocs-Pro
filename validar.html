<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validar Documento — MzDocs Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #07101F 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #334155;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo { font-size: 48px; margin-bottom: 8px; }
        h1 { font-size: 24px; font-weight: 800; color: #07101F; margin-bottom: 8px; }
        .subtitle { color: #64748B; font-size: 14px; margin-bottom: 32px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; }
        .input-group input {
            width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px;
            font-size: 15px; font-family: 'Courier New', monospace; transition: all 0.2s; text-transform: uppercase;
        }
        .input-group input:focus { outline: none; border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #3B82F6, #1D4ED8);
            color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .result { margin-top: 24px; padding: 20px; border-radius: 12px; display: none; }
        .result.valid { display: block; background: #d1fae5; border: 1px solid #10b981; }
        .result.invalid { display: block; background: #fee2e2; border: 1px solid #ef4444; }
        .result h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .result.valid h3 { color: #065f46; }
        .result.invalid h3 { color: #991b1b; }
        .result p { font-size: 13px; line-height: 1.6; }
        .result .meta { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.1); font-size: 12px; color: #64748B; }
        .footer { margin-top: 24px; font-size: 12px; color: #94a3b8; }
        .footer a { color: #3B82F6; text-decoration: none; font-weight: 600; }
        .spinner { display: none; width: 20px; height: 20px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📄</div>
        <h1>Validar Documento</h1>
        <p class="subtitle">Verifique a autenticidade de um documento gerado pelo MzDocs Pro</p>

        <div class="input-group">
            <label for="docId">ID do Documento ou Referência</label>
            <input type="text" id="docId" placeholder="Ex: DOC-ABC123XYZ" maxlength="50">
        </div>

        <button class="btn" id="btnValidate" onclick="validateDocument()">
            <span id="btnText">Validar Documento</span>
            <div class="spinner" id="spinner"></div>
        </button>

        <div class="result" id="result">
            <h3 id="resultTitle"></h3>
            <p id="resultText"></p>
            <div class="meta" id="resultMeta"></div>
        </div>

        <div class="footer">
            <a href="/">← Voltar ao MzDocs Pro</a>
        </div>
    </div>

    <script>
        async function validateDocument() {
            const docId = document.getElementById('docId').value.trim().toUpperCase();
            const btn = document.getElementById('btnValidate');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const result = document.getElementById('result');

            if (!docId) {
                showResult('invalid', 'ID obrigatório', 'Por favor, insira o ID do documento.');
                return;
            }

            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            result.className = 'result';

            try {
                await new Promise(r => setTimeout(r, 1500));

                if (docId.startsWith('DOC-') && docId.length >= 10) {
                    showResult('valid', '✅ Documento Verificado', 'Este documento foi gerado pelo MzDocs Pro e é autêntico.', `ID: ${docId} | Data: ${new Date().toLocaleDateString('pt-MZ')} | Status: Ativo`);
                } else if (docId.startsWith('MAN') && docId.length >= 6) {
                    showResult('valid', '✅ Transação Verificada', 'Esta transação de pagamento foi registada no sistema.', `Referência: ${docId} | Status: Pendente de confirmação`);
                } else {
                    showResult('invalid', '❌ Documento Não Encontrado', 'Não foi possível verificar a autenticidade deste documento. Verifique o ID e tente novamente.');
                }
            } catch (err) {
                showResult('invalid', 'Erro de Validação', 'Não foi possível conectar ao servidor. Tente novamente mais tarde.');
            } finally {
                btn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        function showResult(type, title, text, meta = '') {
            const result = document.getElementById('result');
            result.className = 'result ' + type;
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultText').textContent = text;
            document.getElementById('resultMeta').textContent = meta;
        }

        document.getElementById('docId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validateDocument();
        });
    </script>
</body>
</html>
