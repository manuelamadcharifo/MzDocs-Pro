<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Rounded square background -->
  <rect width="100" height="100" fill="#2E7D52" rx="18"/>

  <!-- Document icon body -->
  <rect x="22" y="14" width="46" height="60" rx="8" ry="8" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>
  <!-- Folded corner -->
  <polyline points="48,14 68,14 68,34 48,34" fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Document lines -->
  <line x1="30" y1="50" x2="60" y2="50" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="60" x2="60" y2="60" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="70" x2="50" y2="70" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Sparkle star -->
  <g transform="translate(74, 24)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#F5C518" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#F5C518" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#F5C518" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#F5C518" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="13" cy="-8" r="2.2" fill="#F5C518"/>
  </g>
</svg>
