<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <!-- Background -->
  <rect width="400" height="220" fill="#2E7D52" rx="12"/>

  <!-- Document icon body -->
  <rect x="155" y="28" width="60" height="78" rx="10" ry="10" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Folded corner -->
  <polyline points="191,28 215,28 215,52 191,52" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>
  <!-- Document lines -->
  <line x1="167" y1="72" x2="203" y2="72" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="167" y1="82" x2="203" y2="82" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="167" y1="92" x2="195" y2="92" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Sparkle star (top right of icon) -->
  <!-- Main 4-point star -->
  <g transform="translate(220, 38)">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#F5C518" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#F5C518" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#F5C518" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#F5C518" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Small dot -->
    <circle cx="16" cy="-10" r="2.5" fill="#F5C518"/>
  </g>

  <!-- Green arc/swoosh under Mz -->
  <path d="M 68 162 Q 110 148 148 158" fill="none" stroke="#6DC04B" stroke-width="4" stroke-linecap="round"/>

  <!-- "Mz" in green -->
  <text x="72" y="178" font-family="'Arial Black', 'Arial', sans-serif" font-size="52" font-weight="900" fill="#6DC04B" letter-spacing="-1">Mz</text>

  <!-- "Docs Pro" in white/cream -->
  <text x="148" y="178" font-family="'Arial Black', 'Arial', sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" letter-spacing="-1">Docs Pro</text>
</svg>
