<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" width="360" height="180">
  <!-- White background -->
  <rect width="360" height="180" fill="#FFFFFF" rx="12"/>

  <!-- Document icon body -->
  <rect x="125" y="18" width="56" height="74" rx="9" ry="9" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>
  <!-- Folded corner -->
  <polyline points="159,18 181,18 181,40 159,40" fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Document lines -->
  <line x1="136" y1="58" x2="170" y2="58" stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="136" y1="68" x2="170" y2="68" stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="136" y1="78" x2="162" y2="78" stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Sparkle star (top right of icon) -->
  <g transform="translate(188, 28)">
    <line x1="0" y1="-11" x2="0" y2="11" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="11" y2="0" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
    <!-- Small dot -->
    <circle cx="14" cy="-9" r="2" fill="#1a1a1a"/>
  </g>

  <!-- Green arc/swoosh under Mz -->
  <path d="M 48 138 Q 88 124 125 133" fill="none" stroke="#6DC04B" stroke-width="3.5" stroke-linecap="round"/>

  <!-- "Mz" in green -->
  <text x="50" y="155" font-family="'Arial Black', 'Arial', sans-serif" font-size="46" font-weight="900" fill="#6DC04B" letter-spacing="-1">Mz</text>

  <!-- "Docs Pro" in black -->
  <text x="120" y="155" font-family="'Arial Black', 'Arial', sans-serif" font-size="46" font-weight="900" fill="#1a1a1a" letter-spacing="-1">Docs Pro</text>
</svg>
