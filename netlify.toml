# ══════════════════════════════════════
# netlify.toml — MzDocs Pro v2
# ══════════════════════════════════════

[build]
  functions = "netlify/functions"
  publish   = "."

# Redirecionar /api/* para as Netlify Functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://api.anthropic.com https://api.mpesa.vm.co.mz https://api.sandbox.vm.co.mz; img-src 'self' data: blob:;"

# Cache estático
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[dev]
  functions    = "netlify/functions"
  targetPort   = 8888
  autoLaunch   = false
