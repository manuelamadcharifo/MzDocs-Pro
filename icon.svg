<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1565C0"/>
  
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Document shape -->
  <rect x="140" y="110" width="200" height="260" rx="16" fill="url(#doc)"/>
  
  <!-- Folded corner -->
  <polygon points="290,110 340,160 290,160" fill="#BBDEFB"/>
  <polygon points="290,110 340,160 290,160" fill="#90CAF9" opacity="0.5"/>
  
  <!-- Lines on document -->
  <rect x="168" y="185" width="120" height="10" rx="5" fill="#1565C0" opacity="0.25"/>
  <rect x="168" y="210" width="145" height="10" rx="5" fill="#1565C0" opacity="0.20"/>
  <rect x="168" y="235" width="100" height="10" rx="5" fill="#1565C0" opacity="0.20"/>
  <rect x="168" y="260" width="130" height="10" rx="5" fill="#1565C0" opacity="0.15"/>
  <rect x="168" y="285" width="90"  height="10" rx="5" fill="#1565C0" opacity="0.15"/>
  
  <!-- WhatsApp green badge -->
  <circle cx="350" cy="360" r="72" fill="#25D366"/>
  <circle cx="350" cy="360" r="72" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.3"/>
  
  <!-- Chat bubble icon inside badge -->
  <path d="M350 318 C324 318 303 336 303 358 C303 370 309 381 320 389 L315 410 L338 401 C342 402 346 403 350 403 C376 403 397 385 397 363 C397 341 376 318 350 318 Z" fill="white"/>
  <rect x="332" y="352" width="36" height="6" rx="3" fill="#25D366"/>
  <rect x="332" y="365" width="24" height="6" rx="3" fill="#25D366"/>
  
  <!-- MZ flag accent bar at bottom -->
  <rect x="140" y="355" width="175" height="15" rx="0" fill="#009A44" opacity="0.85"/>
  <rect x="140" y="355" width="58"  height="15" rx="0" fill="#FFD700" opacity="0.9"/>
</svg>
